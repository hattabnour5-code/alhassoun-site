<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>فرن الحسون</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- Header -->
  <header class="site-header">
    <div class="logo">
      <img src="pictures/photo_2025-11-19_19-47-52-removebg-preview.png"  alt="Logo">
      <span class="logo-text">فرن الحسون🔥</span>
    </div>
  </header>

  <!-- Hero Section -->
  <main>
    <section class="hero">
      <div class="fire-glow"></div>
      <div class="smoke"></div>
      <h1 class="hero-title">أطيب لقمة</h1>
      <p class="hero-sub">الأصناف — لمسة نار وذوق أصيل</p>
    </section>

    <!-- Menu Section -->
    <section class="menu">
  <div class="menu-track" id="menuTrack">
    <!-- مثال: مناقيش -->
    <a href="manakeesh.html" class="card">
      <img src="pictures/manakeesh.png"  alt="Zaatar">
      <div class="card-body"><h3>مناقيش</h3></div>
    </a>

    <!-- باقي الأصناف -->
    <article class="card" onclick="location.href='pizza.html';" style="cursor:pointer;">
    <img src="pictures/pizza.png" alt="Pizza">
    <div class="card-body"><h3>بيتزا</h3></div>
    </article>

    <article class="card">
      <img src="pictures/mouajanat.png"  onclick="location.href='mou3ajanet.html'" alt="Mouajanat">
      <div class="card-body"><h3>معجنات</h3></div>
    </article>
    <article class="card">
      <img src="pictures/shofan.png"  alt="Shofan">
      <div class="card-body"><h3>شوفان</h3></div>
    </article>
    <article class="card">
      <img src="pictures/kaak.png"  alt="Kaak">
      <div class="card-body"><h3>كعك</h3></div>
    </article>
  </div>
</section>

  </main>

  <!-- WhatsApp Fixed Button -->
  <a id="quickWhatsApp" class="fab-whatsapp" href="#" target="_blank" rel="noopener">
    💬 WhatsApp
  </a>

  <!-- Quick Order Modal -->
  <div id="orderModal" class="modal" aria-hidden="true">
    <div class="modal-card">
      <button id="closeOrder" class="modal-close">&times;</button>
      <h2>طلب سريع</h2>
      <form id="orderForm">
        <label>الاسم:<input name="name" required /></label>
        <label>رقم الهاتف: <input name="phone" inputmode="tel" required /></label>
        <label>الموقع:<input name="location" /></label>
        <label>الطلب:<textarea name="order" rows="3"></textarea></label>
        <div class="actions">
          <button type="submit" class="primary">إرسال</button>
          <button type="button" id="cancelOrder">إلغاء</button>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
