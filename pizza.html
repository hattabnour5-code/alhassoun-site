<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>فرن الحسون — بيتزا</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="logo">
      <img src="pictures/photo_2025-11-19_19-47-52-removebg-preview.png" alt="Logo">
      فرن <span>الحسون🔥</span>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="fire-glow"></div>
      <div class="smoke"></div>
      <h1 class="hero-title">اطيب بيتزا !!</h1>
    </section>

    <section class="menu">
      <div class="menu-track">
        <article class="card">
          <img src="pictures/pepperoni.png" alt="Pepperoni">
          <div class="card-body"><h3>ببروني</h3></div>
        </article>
        <article class="card">
          <img src="pictures/pizza_margherita.png" alt="Margherita">
          <div class="card-body"><h3>مارغريتا</h3></div>
        </article>
        <article class="card">
          <img src="pictures/fajita.png" alt="Fajita">
          <div class="card-body"><h3>فاهيتا</h3></div>
        </article>
        <article class="card">
          <img src="pictures/pizza_chicken_bbq.png" alt="Chicken BBQ">
          <div class="card-body"><h3>تشيكن باربيكيو</h3></div>
        </article>
        <article class="card">
          <img src="pictures/Turkey_cheese.png" alt="Ham">
          <div class="card-body"><h3>حبش</h3></div>
        </article>
        <article class="card">
          <img src="pictures/martadellaa.png" alt="Salami">
          <div class="card-body"><h3>مرتديلا</h3></div>
        </article>
        <article class="card">
          <img src="pictures/pizza_vegetable.png" alt="Vegetable">
          <div class="card-body"><h3>خضرا</h3></div>
        </article>
        <article class="card">
          <img src="pictures/pizza_sausage.png" alt="Sausage">
          <div class="card-body"><h3>سجق</h3></div>
        </article>
      </div>
    </section>
  </main>

  <a id="quickWhatsApp" class="fab-whatsapp" href="#" target="_blank" rel="noopener">
    💬 WhatsApp
  </a>

  <div id="orderModal" class="modal" aria-hidden="true">
    <div class="modal-card">
      <button id="closeOrder" class="modal-close">&times;</button>
      <h2>طلب سريع</h2>
      <form id="orderForm">
        <label>الاسم:<input name="name" required /></label>
        <label>رقم الهاتف: <input name="phone" inputmode="tel" required /></label>
        <label>الموقع:<input name="location" /></label>
        <label>الطلب:<textarea name="order" rows="3"></textarea></label>
        <div class="actions">
          <button type="submit" class="primary">إرسال</button>
          <button type="button" id="cancelOrder">إلغاء</button>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
