<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>فرن الحسون — مناقيش</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Header -->
  <header class="site-header">
    <div class="logo">
      <img src="pictures/photo_2025-11-19_19-47-52-removebg-preview.png"  alt="Logo">
      فرن <span>الحسون🔥</span>
    </div>
  </header>

  <!-- Hero Section -->
  <main>
    <section class="hero">
      <div class="fire-glow"></div>
      <div class="smoke"></div>
      <h1 class="hero-title">اطيب منقوشة !!</h1>
    </section>

    <!-- Manakeesh Section -->
    <section class="menu">
  <div class="menu-track">
    <article class="card">
      <img src="pictures/cheese.png" alt="جبنة">
      <div class="card-body"><h3>جبنة</h3></div>
    </article>
    <article class="card">
      <img src="pictures/kishk.png" alt="كشك">
      <div class="card-body"><h3>كشك</h3></div>
    </article>
    <article class="card">
      <img src="pictures/zaatar.png"  alt="زعتر">
      <div class="card-body"><h3>زعتر</h3></div>
    </article>
    <article class="card">
      <img src="pictures/tomato_onion.png"  alt="بندورة وبصل">
      <div class="card-body"><h3>بندورة وبصل</h3></div>
    </article>

    <article class="card">
      <img src="pictures/Turkey_cheese.png"  alt="بندورة وبصل">
      <div class="card-body"><h3>حبش و جبنة</h3></div>
    </article>
    <article class="card">
      <img src="pictures/lahme.png"  alt="بندورة وبصل">
      <div class="card-body"><h3ب>لحم بعجين</h3></div>
    </article>
    <article class="card">
      <img src="pictures/pepperoni.png"  alt="بندورة وبصل">
      <div class="card-body"><h3>بيبروني </h3></div>
    </article>
    <article class="card">
      <img src="pictures/martadellaa.png"  alt="بندورة وبصل">
      <div class="card-body"><h3>مرتديلا و جبنة</h3></div>
    </article>
    <article class="card">
      <img src="pictures/sujuk.png"  alt="بندورة وبصل">
      <div class="card-body"><h3>سجق و جبنة</h3></div>
    </article>
    
    <!-- باقي الأصناف بنفس الطريقة -->
  </div>
</section>

  </main>

  <!-- WhatsApp Fixed Button -->
  <a id="quickWhatsApp" class="fab-whatsapp" href="#" target="_blank" rel="noopener">
    💬 WhatsApp
  </a>

  <!-- Quick Order Modal -->
  <div id="orderModal" class="modal" aria-hidden="true">
    <div class="modal-card">
      <button id="closeOrder" class="modal-close">&times;</button>
      <h2>طلب سريع</h2>
      <form id="orderForm">
        <label>الاسم:<input name="name" required /></label>
        <label>رقم الهاتف:<input name="phone" inputmode="tel" required /></label>
        <label>الموقع:<input name="location" /></label>
        <label>الطلب:<textarea name="order" rows="3"></textarea></label>
        <div class="actions">
          <button type="submit" class="primary">إرسال</button>
          <button type="button" id="cancelOrder">إلغاء</button>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
